<!DOCTYPE html>
<html lang="ar">
<head>
  <meta charset="UTF-8">
  <title>عرض المادة</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body {
      margin: 0;
      font-family: 'Arial', sans-serif;
      background-color: #f1f1f1;
      direction: rtl;
    }
    .top-bar {
      background-color: #00796b;
      color: white;
      padding: 15px;
      display: flex;
      align-items: center;
    }
    .back-btn {
      margin-left: auto;
      background: none;
      border: none;
      color: white;
      font-size: 24px;
      cursor: pointer;
    }
    iframe {
      width: 100%;
      height: calc(100vh - 50px);
      border: none;
    }
  </style>
</head>
<body>

  <div class="top-bar">
    <span id="subjectTitle">تحميل</span>
    <button class="back-btn" onclick="window.close()">←</button>
  </div>

  <iframe id="driveFrame" src=""></iframe>

  <script>
    const params = new URLSearchParams(window.location.search);
    const title = params.get('title') || 'عرض الملف';
    const link = params.get('link');

    document.getElementById('subjectTitle').textContent = title;

    if (link) {
      document.getElementById('driveFrame').src = link;
    } else {
      document.getElementById('driveFrame').outerHTML = "<p style='padding:20px;'>الرابط غير متوفر</p>";
    }
  </script>

</body>
</html>
