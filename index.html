    function showSubjects(stream) {
      currentStream = stream;
      document.getElementById("main").classList.add("hidden");
      document.getElementById("subjects").classList.remove("hidden");

      const subjectsDiv = document.getElementById("subjectsList");
      subjectsDiv.innerHTML = "";

      const subjects = driveLinks[stream];
      for (let subject in subjects) {
        const btn = document.createElement("button");
        btn.className = "card";
        btn.textContent = subject;
        btn.onclick = () => openDriveLink(stream, subject);
        subjectsDiv.appendChild(btn);
      }
    }

    function goBack() {
      document.getElementById("main").classList.remove("hidden");
      document.getElementById("subjects").classList.add("hidden");
    }

    function openDriveLink(stream, subject) {

      if (url) {
        window.open(url, '_blank');
